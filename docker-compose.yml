services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-legalreview}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-legalreview}
      POSTGRES_DB: ${POSTGRES_DB:-legalreview}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-legalreview} -d ${POSTGRES_DB:-legalreview}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://legalreview:legalreview@postgres:5432/legalreview}
      SECRET_KEY: ${SECRET_KEY:-change-me-for-local-demo}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      BACKEND_CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-http://localhost:3000}
      FRONTEND_BASE_URL: ${FRONTEND_BASE_URL:-http://localhost:3000}
      N8N_WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://n8n:5678/webhook/document-reviewed}
      N8N_OBLIGATIONS_WEBHOOK_URL: ${N8N_OBLIGATIONS_WEBHOOK_URL:-http://n8n:5678/webhook/legal-obligations}
      EMAIL_SENDER: ${EMAIL_SENDER:-legalreview@example.com}
      EMAIL_OPS_RECIPIENT: ${EMAIL_OPS_RECIPIENT:-reviewer@example.com}
      EMAIL_MANAGER_RECIPIENT: ${EMAIL_MANAGER_RECIPIENT:-admin@example.com}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-https://api.openai.com/v1}
      OPENAI_REVIEW_MODEL: ${OPENAI_REVIEW_MODEL:-gpt-4o-mini}
      OPENAI_CHAT_MODEL: ${OPENAI_CHAT_MODEL:-}
      OPENAI_TIMEOUT_SECONDS: ${OPENAI_TIMEOUT_SECONDS:-90}
      MANUAL_REVIEW_RISK_SCORE_THRESHOLD: ${MANUAL_REVIEW_RISK_SCORE_THRESHOLD:-70}
      OCR_ENABLED: ${OCR_ENABLED:-true}
      OCR_LANGUAGES: ${OCR_LANGUAGES:-vie+eng}
      OCR_MAX_PAGES: ${OCR_MAX_PAGES:-10}
      AI_REVIEW_EXCERPT_CHARS: ${AI_REVIEW_EXCERPT_CHARS:-120000}
      AI_CHAT_EXCERPT_CHARS: ${AI_CHAT_EXCERPT_CHARS:-70000}
      AI_OBLIGATION_EXCERPT_CHARS: ${AI_OBLIGATION_EXCERPT_CHARS:-70000}
      SEED_SAMPLE_DOCUMENTS: ${SEED_SAMPLE_DOCUMENTS:-false}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "8000:8000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             python -m app.db.seed &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    ports:
      - "3000:3000"
    depends_on:
      - backend

  n8n:
    image: n8nio/n8n:latest
    environment:
      N8N_HOST: localhost
      N8N_PORT: 5678
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://localhost:5678/
      GENERIC_TIMEZONE: Asia/Ho_Chi_Minh
      SMTP_HOST: ${SMTP_HOST:-mailhog}
      SMTP_PORT: ${SMTP_PORT:-1025}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      EMAIL_OPS_RECIPIENT: ${EMAIL_OPS_RECIPIENT:-reviewer@example.com}
      EMAIL_MANAGER_RECIPIENT: ${EMAIL_MANAGER_RECIPIENT:-admin@example.com}
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend

  mailhog:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres_data:
  uploads:
  n8n_data:
